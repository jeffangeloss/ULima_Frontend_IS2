name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    # Credenciales de firma (se leen de los Secrets del repo). Si no están
    # configuradas, el paso de firma se salta y el release se firma con debug
    # (comportamiento anterior), sin romper el workflow.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Instalar dependencias
        run: flutter pub get

      - name: Configurar firma de release (keystore desde Secrets)
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          echo "✅ Firmando el release con la keystore estable."

      - name: Compilar APK
        run: flutter build apk --release

      - name: Preparar APKs
        run: |
          mkdir -p release

          # APK estable para la landing
          cp build/app/outputs/flutter-apk/app-release.apk release/ULimaPlus.apk

          # APK versionado para historial
          cp build/app/outputs/flutter-apk/app-release.apk release/ULimaPlus-build-${{ github.run_number }}.apk

      - name: Crear o actualizar Release Latest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ULima++ Latest
          body: |
            Última versión compilada automáticamente.

            Build: #${{ github.run_number }}
            Commit: ${{ github.sha }}

          files: |
            release/ULimaPlus.apk
            release/ULimaPlus-build-${{ github.run_number }}.apk

          make_latest: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}