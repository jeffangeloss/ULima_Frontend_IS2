name: Build and Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Validar secretos de firma
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            ANDROID_KEYSTORE_BASE64 \
            ANDROID_KEYSTORE_PASSWORD \
            ANDROID_KEY_ALIAS \
            ANDROID_KEY_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Faltan GitHub Secrets de firma: ${missing[*]}"
            exit 1
          fi

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Instalar dependencias
        run: flutter pub get

      - name: Configurar firma de release (keystore desde Secrets)
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

          keytool -list \
            -keystore android/app/upload-keystore.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" > /dev/null
          echo "✅ Firmando el release con la keystore estable."

      - name: Compilar APK
        run: flutter build apk --release --dart-define=API_BASE_URL=https://u-lima-backend-is-2-tau.vercel.app

      - name: Verificar firma y autorización de Firebase Auth
        shell: bash
        run: |
          set -euo pipefail

          apk="build/app/outputs/flutter-apk/app-release.apk"
          build_tools_version="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort -V | tail -n 1)"
          apksigner="$ANDROID_HOME/build-tools/$build_tools_version/apksigner"
          aapt2="$ANDROID_HOME/build-tools/$build_tools_version/aapt2"

          "$apksigner" verify "$apk"
          cert_sha1_display="$(
            "$apksigner" verify --print-certs-pem "$apk" \
              | sed -n '/-----BEGIN CERTIFICATE-----/,/-----END CERTIFICATE-----/p' \
              | openssl x509 -noout -fingerprint -sha1 \
              | sed 's/^[^=]*=//'
          )"
          cert_sha1="$(printf '%s' "$cert_sha1_display" | tr -d ':' | tr '[:upper:]' '[:lower:]')"
          package_name="$("$aapt2" dump packagename "$apk" | tr -d '\r\n')"

          if [[ -z "$cert_sha1" || -z "$package_name" ]]; then
            echo "::error::No se pudo obtener package name o SHA-1 del APK."
            exit 1
          fi

          config_api_key="$(jq -r --arg package "$package_name" '
            .client[]
            | select(.client_info.android_client_info.package_name == $package)
            | .api_key[0].current_key // empty
          ' android/app/google-services.json)"
          runtime_api_key="$(sed -n "/static const FirebaseOptions android =/,/);/ s/^[[:space:]]*apiKey: '\([^']*\)'.*/\1/p" lib/firebase_options.dart)"

          if [[ -z "$config_api_key" || -z "$runtime_api_key" ]]; then
            echo "::error::No se encontró la API key Android en google-services.json o firebase_options.dart."
            exit 1
          fi

          if [[ "$config_api_key" != "$runtime_api_key" ]]; then
            echo "::error::Las API keys Android de google-services.json y firebase_options.dart no coinciden. Ejecuta flutterfire configure."
            exit 1
          fi

          response_file="$RUNNER_TEMP/firebase-auth-signature-check.json"
          http_code="$(curl --silent --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 2 \
            --output "$response_file" \
            --write-out '%{http_code}' \
            "https://identitytoolkit.googleapis.com/v1/accounts:signInWithCustomToken?key=$runtime_api_key" \
            --header 'Content-Type: application/json' \
            --header "X-Android-Package: $package_name" \
            --header "X-Android-Cert: $cert_sha1" \
            --data '{"token":"ci-signature-check","returnSecureToken":true}')"

          if jq -e '
            .error.details[]?
            | select(.reason == "API_KEY_ANDROID_APP_BLOCKED")
          ' "$response_file" > /dev/null; then
            echo "::error::Google Cloud bloquea Firebase Auth para $package_name con SHA-1 $cert_sha1_display. Agrega esta combinación a las restricciones Android de la API key."
            exit 1
          fi

          error_message="$(jq -r '.error.message // empty' "$response_file")"
          if [[ "$http_code" != "400" || "$error_message" != INVALID_CUSTOM_TOKEN* ]]; then
            echo "::error::La comprobación de Firebase Auth devolvió HTTP $http_code: $error_message"
            exit 1
          fi

          echo "✅ Firebase Auth autoriza $package_name con SHA-1 $cert_sha1_display."

      - name: Preparar APKs
        run: |
          mkdir -p release

          # APK estable para la landing
          cp build/app/outputs/flutter-apk/app-release.apk release/ULimaPlus.apk

          # APK versionado para historial
          cp build/app/outputs/flutter-apk/app-release.apk release/ULimaPlus-build-${{ github.run_number }}.apk

      - name: Crear o actualizar Release Latest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ULima++ Latest
          body: |
            Última versión compilada automáticamente.

            Build: #${{ github.run_number }}
            Commit: ${{ github.sha }}

          files: |
            release/ULimaPlus.apk
            release/ULimaPlus-build-${{ github.run_number }}.apk

          make_latest: true

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
