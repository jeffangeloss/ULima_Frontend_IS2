name: Build APK Test

on:
  push:
    branches:
      - feature/github-actions-apk
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Instalar Flutter
        run: |
          git clone https://github.com/flutter/flutter.git --depth 1 -b stable "$HOME/flutter"
          echo "$HOME/flutter/bin" >> "$GITHUB_PATH"

      - name: Verificar Flutter
        run: flutter doctor -v

      - name: Descargar dependencias
        run: flutter pub get

      - name: Compilar APK release
        run: flutter build apk --release

      - name: Preparar APK de prueba
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/ULimaPlus-test.apk

      - name: Guardar APK como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ULimaPlus-test-apk
          path: release/ULimaPlus-test.apk